<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Escala de Trabalho</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <h1>Calendário de Escala</h1>
  <div class="controls">
    <button id="prev" aria-label="Mês anterior">◀</button>
    <h2 id="monthYear"></h2>
    <button id="next" aria-label="Próximo mês">▶</button>
    <button id="printMonth">Imprimir</button>
  </div>
</header>

<div class="calendar-container">
  <div class="weekdays">
    <div>Dom</div><div>Seg</div><div>Ter</div>
    <div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div>
  </div>
  <div id="calendar"></div>
</div>

<footer>
  <div class="legenda">
    <div><span class="dot grupoA"></span> Escala</div>
    <div><span class="dot ensaio"></span> Ensaio</div>
    <div><span class="dot faespe"></span> Faesp</div>
  </div>
  <div class="dev">
    <strong>Desenvolvedor:</strong> Paulo Cesar Camargo
  </div>
</footer>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span id="closeModal">&times;</span>
    <div id="modalFotos" class="modal-fotos"></div>
    <h2 id="modalNome"></h2>
    <p id="rowCargo"><b>Cargo:</b> <span id="modalCargo"></span></p>
    <p id="rowEndereco"><b>Endereço:</b> <span id="modalEndereco"></span></p>
    <p id="rowContato"><b>Contato:</b> <span id="modalContato"></span></p>
    <p><b>Atividade:</b> <span id="modalAtividade"></span></p>
  </div>
</div>

<div id="toast" class="toast" role="status" aria-live="polite"></div>

<script src="script.js"></script>
</body>
</html>
